name: Auto-Update NBA Rosters

on:
  schedule:
    - cron: '0 6 * * *'   # Runs every day at 6AM UTC
  workflow_dispatch:        # Also allows manual trigger from GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install nba_api pandas requests

      - name: Run roster update agent
        run: python update_rosters.py

      - name: Commit and push if changed
        run: |
          git config user.name "HoopRater Bot"
          git config user.email "hooprater-bot@users.noreply.github.com"
          git add teams_data.py
          git diff --staged --quiet || git commit -m "🏀 Auto-update NBA rosters $(date -u '+%Y-%m-%d')"
          git push
